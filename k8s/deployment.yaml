apiVersion: apps/v1
kind: Deployment
metadata:
  name: name-application
  labels:
    app: name-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: name-application
  template:
    metadata:
      labels:
        app: name-application
    spec:
      containers:
        - name: name-application
          image: docker.io/raziriz/name-application:f4d12cc61bb8ad07b1d572c1aa9fd10e1ba24853
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
