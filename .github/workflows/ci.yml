name: Build and Deploy

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set environment and image tag
        id: vars
        run: |
          BRANCH=${GITHUB_REF_NAME}
          SHA=${{ github.sha }}
          if [ "$BRANCH" = "main" ]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
            echo "TAG=${SHA}" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENV=staging" >> $GITHUB_OUTPUT
            echo "TAG=staging-${SHA}" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "TAG=dev-${SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/name-application:${{ steps.vars.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/name-application:${{ steps.vars.outputs.ENV }}-latest

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|image: docker.io/.*/name-application:.*|image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/name-application:${{ steps.vars.outputs.TAG }}|" k8s/${{ steps.vars.outputs.ENV }}/deployment.yaml
          cat k8s/${{ steps.vars.outputs.ENV }}/deployment.yaml | grep image

      - name: Commit and push updated deployment.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/${{ steps.vars.outputs.ENV }}/deployment.yaml
          git diff --staged --quiet || git commit -m "ci(${{ steps.vars.outputs.ENV }}): update image tag to ${{ steps.vars.outputs.TAG }}"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
